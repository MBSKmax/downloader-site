<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperDownloader - Best Social Media Video Saver</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --dark: #2d3436; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .app-card { background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: var(--primary); font-size: 24px; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; border: 2px solid #dfe6e9; border-radius: 12px; margin-bottom: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-extract { background: var(--primary); color: white; }
        .footer-nav { margin-top: 40px; text-align: center; }
        .footer-nav a { color: var(--primary); text-decoration: none; margin: 0 10px; font-weight: bold; font-size: 14px; }
        #loader { display: none; margin: 20px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app-card">
        <h1>🚀 SuperDownloader</h1>
        <p>Paste link (TikTok, Insta, FB)</p>
        <input type="text" id="videoUrl" placeholder="https://...">
        <button class="btn-extract" onclick="handleDownload()">Extract Media</button>
        <center><div id="loader"></div></center>
        <div id="result" style="display:none; margin-top:20px;">
            <img id="preview" style="width:100%; border-radius:12px;">
            <p id="vTitle" style="font-weight:600; font-size:14px;"></p>
            <a id="dlLink" target="_blank"><button style="background:var(--success); color:white;">Download Now</button></a>
        </div>
    </div>

    <div class="footer-nav">
        <a href="index.html">Home</a> | <a href="articles.html">Guides</a> | <a href="premium.html">Premium</a> | <a href="contact.html">Contact</a>
    </div>

    <script>
        async function handleDownload() {
            const url = document.getElementById("videoUrl").value;
            const loader = document.getElementById("loader");
            const result = document.getElementById("result");
            if(!url) return alert("Please paste a link!");

            loader.style.display = "block";
            result.style.display = "none";

            try {
                // Yahan apna Render ka backend URL daalna hai
                const res = await fetch("https://YOUR-RENDER-APP.onrender.com/extract", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url })
                });
                const data = await res.json();
                if(data.success) {
                    document.getElementById("preview").src = data.thumbnail;
                    document.getElementById("vTitle").innerText = data.title;
                    document.getElementById("dlLink").href = data.download_url;
                    result.style.display = "block";
                } else { alert("Error: " + data.error); }
            } catch(e) { alert("Server Error! Check backend."); }
            finally { loader.style.display = "none"; }
        }
    </script>
</body>
</html>
